set -g prefix M-a
set -g escape-time 0             # zero-out escape time delay
set -g mouse on
set -g extended-keys on
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g set-clipboard on          # use system clipboard
set -g history-limit 10000     # increase history size (from 2,000)
set -g default-terminal "${TERM}"
set -ga terminal-overrides ',xterm*:RGB'
set -ga terminal-features ',xterm*:extkeys'
set -ga terminal-features ',xterm*:hyperlinks'
set -ga terminal-features ',xterm*:clipboard'
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on       # renumber all windows when any window is closed
set -g popup-border-lines rounded
set -g pane-border-lines single
set -g menu-border-lines rounded
set -g pane-border-indicators both
set -g mode-keys vi

bind A select-pane -Zl           # select last active pane keeping the zoom state
bind M-v select-layout main-vertical
bind M-s select-layout main-horizontal
bind M-t select-layout even-vertical
bind M-s set -g pane-border-status
bind -n M-` run "#{@popup-toggle} -w75% -h75% -Ed'##{pane_current_path}'"
bind "O" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --reverse --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --no-border \
    --input-border \
    --header-border \
    --list-border \
    --header '^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:50%' \
    --preview 'sesh preview {}'
)\""

source ~/.config/tmux/theme.tmux

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'loichyan/tmux-toggle-popup'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'trevarj/tmux-open-nvim'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# set -g @plugin 'fabioluciano/tmux-powerkit'

set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_show_sync_mode 'on'
set -g @prefix_highlight_empty_has_affixes 'on'
set -g @prefix_highlight_prefix_prompt ''
set -g @prefix_highlight_copy_prompt ''
set -g @prefix_highlight_sync_prompt ''
set -g @prefix_highlight_empty_prompt ''
set -g @prefix_highlight_fg 'colour3,bold'
set -g @prefix_highlight_bg 'NONE'
set -g @prefix_highlight_sync_mode_attr 'fg=colour2,bold,bg=NONE'
set -g @prefix_highlight_copy_mode_attr 'fg=colour5,bold,bg=NONE'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
# Launches helper script on Ctrl+[key] in fingers mode
set -g @fingers-alt-action "xargs -I {} tmux run-shell 'cd #{pane_current_path}; ~/.config/.tmux/plugins/tmux-open-nvim/scripts/ton {} > ~/.config/.tmux/plugins/tmux-open-nvim/ton.log'"
set -g @fingers-jump-key M-j
set -g @powerkit_status_position "bottom"
set -g @powerkit_theme_selector_key ""
set -g @powerkit_theme "gruvbox"
set -g @powerkit_plugins "datetime,battery,cpu,memory,hostname,git,appearance"

# TPM bootstrap
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

run '~/.config/tmux/plugins/tpm/tpm'
